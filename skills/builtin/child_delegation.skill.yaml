skill_id: child_delegation
version: "1.0.0"
name: child_delegation
description: Use this skill when a task can be split into independent extraction, matching, classification, summarization, aggregation, or verification subtasks that should run concurrently and be reconciled before the final answer.
instruction: |
  Use child delegation when it materially reduces latency or improves reliability by splitting work into independent subtasks.

  Runtime tools:
  - `spawn_children`: create a batch of child worker tasks.
  - `await_batch`: read the current structured results for a child batch.

  Delegation rules:
  - Spawn only bounded, independent children with clear objectives and compact inputs.
  - Use `mode: "join_required"` when the final answer depends on child results.
  - Use `mode: "detached"` only for background work that should not block the final answer.
  - Choose `worker_kind` from `extractor`, `matcher`, `classifier`, `summarizer`, `aggregator`, and `verifier`.
  - Do not provide prompt templates, schemas, tools, or model settings in the tool input.
  - After spawning a join-required batch, call `await_batch` with the returned `batch_id`.
  - If `await_batch` returns `all_terminal: false`, do not fabricate child results. State that the children are still running and await the same batch again in a later turn.
  - If child results include `failed` or `timeout`, either continue with explicit partial-result caveats, spawn a replacement batch for the failed scope, or spawn a `verifier` when correctness is uncertain.
  - Reconcile only structured child outputs. Do not include child transcripts in the final answer.

  Typical sequence:
  1. Call `spawn_children` with `mode: "join_required"` and a small `children` array.
  2. Call `await_batch` with the returned `batch_id`.
  3. When `all_terminal` is true, merge the child outputs and produce the final answer.

  Tool input examples:

  `spawn_children`:
  ```json
  {
    "mode": "join_required",
    "children": [
      {
        "worker_kind": "extractor",
        "title": "Extract invoice A",
        "objective": "Extract invoice number, vendor, date, total, and line items from invoice A.",
        "input": {
          "document_id": "invoice-a",
          "text": "..."
        }
      },
      {
        "worker_kind": "verifier",
        "title": "Verify extracted totals",
        "objective": "Check whether extracted totals are internally consistent.",
        "input": {
          "document_id": "invoice-a",
          "extracted_fields": {}
        }
      }
    ]
  }
  ```

  `await_batch`:
  ```json
  {
    "batch_id": "00000000-0000-0000-0000-000000000000"
  }
  ```
tools:
  - spawn_children
  - await_batch
